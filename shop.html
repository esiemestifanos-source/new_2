  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== SHOPIFY PRODUCT CUSTOM STYLING ===== */
    .shopify-container {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 30px !important;
      max-width: 1400px !important;
      margin: 0 auto !important;
      padding: 40px 20px !important;
    }

    /* Product Card */
    .shopify-buy__product {
      background: #1a1a1a !important;
      border: 1px solid #2a2a2a !important;
      border-radius: 0 !important;
      padding: 0 !important;
      transition: all 0.4s ease !important;
      position: relative !important;
      overflow: hidden !important;
      opacity: 0;
      animation: fadeInUp 0.8s forwards;
    }

    .shopify-buy__product:nth-child(1) { animation-delay: 0.1s; }
    .shopify-buy__product:nth-child(2) { animation-delay: 0.2s; }
    .shopify-buy__product:nth-child(3) { animation-delay: 0.3s; }
    .shopify-buy__product:nth-child(4) { animation-delay: 0.4s; }
    .shopify-buy__product:nth-child(5) { animation-delay: 0.5s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shopify-buy__product:hover {
      border-color: #c9b698 !important;
      transform: translateY(-8px) !important;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important;
    }

    /* Product Image */
    .shopify-buy__product__image {
      aspect-ratio: 3/4 !important;
      overflow: hidden !important;
      background: #1a1a1a !important;
    }

    .shopify-buy__product__image img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      transition: transform 0.8s ease !important;
      filter: grayscale(100%) brightness(0.95) !important;
    }

    .shopify-buy__product:hover .shopify-buy__product__image img {
      transform: scale(1.08) !important;
      filter: grayscale(80%) brightness(1.05) !important;
    }

    /* Product Title */
    .shopify-buy__product__title {
      font-family: 'Times New Roman', serif !important;
      font-size: 1.2rem !important;
      letter-spacing: 2px !important;
      color: #f5f5f5 !important;
      padding: 20px 20px 5px !important;
      text-transform: uppercase !important;
      font-weight: 300 !important;
      margin: 0 !important;
    }

    /* Product Price */
    .shopify-buy__product__price {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      color: #c9b698 !important;
      font-size: 1.4rem !important;
      padding: 0 20px 15px !important;
      margin: 0 !important;
      font-weight: 400 !important;
    }

    /* Add to Cart Button */
    .shopify-buy__btn {
      background: transparent !important;
      color: #f5f5f5 !important;
      border: 1px solid #c9b698 !important;
      border-radius: 0 !important;
      padding: 15px 25px !important;
      margin: 0 20px 20px 20px !important;
      width: calc(100% - 40px) !important;
      letter-spacing: 3px !important;
      font-size: 0.8rem !important;
      text-transform: uppercase !important;
      cursor: pointer !important;
      transition: all 0.4s ease !important;
      position: relative !important;
      overflow: hidden !important;
      font-weight: 400 !important;
    }

    .shopify-buy__btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s;
    }

    .shopify-buy__btn:hover::before {
      left: 100%;
    }

    .shopify-buy__btn:hover {
      background: #c9b698 !important;
      color: #000000 !important;
      transform: translateY(-2px) !important;
      box-shadow: 0 5px 15px rgba(201, 182, 152, 0.3) !important;
    }

    /* Hide quantity selector */
    .shopify-buy__quantity {
      display: none !important;
    }

    /* Notification */
    .shop-notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #c9b698;
      color: #000;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10000;
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      border: none;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    .shop-notification.show {
      transform: translateX(0);
    }

    .shop-notification i {
      font-size: 1.2rem;
    }

    /* Mobile Responsive */
    @media (max-width: 992px) {
      .shopify-container {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }

    @media (max-width: 600px) {
      .shopify-container {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
        padding: 20px !important;
      }
      
      .shopify-buy__product__title {
        font-size: 1rem !important;
        padding: 15px 15px 5px !important;
      }
      
      .shopify-buy__product__price {
        font-size: 1.2rem !important;
        padding: 0 15px 10px !important;
      }
      
      .shopify-buy__btn {
        padding: 12px 20px !important;
        margin: 0 15px 15px 15px !important;
        width: calc(100% - 30px) !important;
        font-size: 0.7rem !important;
      }
      
      .shop-title {
        font-size: 2.5rem !important;
      }
      
      .shop-subtitle {
        font-size: 0.8rem !important;
      }
    }
  </style>
</head>

<!-- SIMPLE JAVASCRIPT FOR NOTIFICATION AND MENU -->
<script>
// Notification function
window.showNotification = function(message) {
  const notification = document.getElementById('shopNotification');
  const messageSpan = document.getElementById('notificationMessage');
  
  messageSpan.textContent = message;
  notification.classList.add('show');
  
  setTimeout(() => {
    notification.classList.remove('show');
  }, 2000);
};

document.addEventListener('DOMContentLoaded', function() {
  // Mobile menu toggle
  const menuToggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');
  
  if (menuToggle) {
    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      nav.classList.toggle('active');
      
      const icon = this.querySelector('i');
      if (nav.classList.contains('active')) {
        icon.classList.remove('fa-bars');
        icon.classList.add('fa-times');
      } else {
        icon.classList.remove('fa-times');
        icon.classList.add('fa-bars');
      }
    });
  }
  
  // Close menu when clicking on nav links
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function() {
      nav.classList.remove('active');
      const icon = document.querySelector('.menu-toggle i');
      if (icon) {
        icon.classList.remove('fa-times');
        icon.classList.add('fa-bars');
      }
    });
  });
  
  // Scroll to top
  const scrollTop = document.querySelector('.scroll-top');
  
  window.addEventListener('scroll', function() {
    if (window.scrollY > 500) {
      scrollTop.classList.add('visible');
    } else {
      scrollTop.classList.remove('visible');
    }
  });
  
  if (scrollTop) {
    scrollTop.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
  
  // Add click notification to Shopify buttons
  setTimeout(function() {
    document.querySelectorAll('.shopify-buy__btn').forEach(btn => {
      btn.addEventListener('click', function() {
        setTimeout(() => {
          showNotification('Product added to cart');
        }, 500);
      });
    });
  }, 2000);
});
</script>
